builders:
  table:
    import: "package:native_sqlite_generator/builder.dart"
    builder_factories: ["tableBuilder"]
    build_extensions: {".dart": [".table.dart"]}
    auto_apply: dependents
    build_to: source  # Changed from cache to source - generates in lib/
    applies_builders: ["source_gen|combining_builder"]
  
  migration:
    import: "package:native_sqlite_generator/builder.dart"
    builder_factories: ["migrationBuilder"]
    build_extensions: {"$lib$": ["generated/native_sqlite_schema.json"]}
    auto_apply: dependents
    build_to: source
    runs_before: ["native_sqlite_generator:schema_registry", "native_sqlite_generator:table"]

  schema_registry:
    import: "package:native_sqlite_generator/builder.dart"
    builder_factories: ["schemaRegistryBuilder"]
    build_extensions: {"$lib$": ["generated/database_manager.dart"]}
    auto_apply: dependents
    build_to: source
    runs_before: ["native_sqlite_generator:table"]
    # Generates to lib/generated/database_manager.dart
    # Reads migrations from native_sqlite_schema.json (generated by migration builder)

post_process_builders:
  native_code:
    import: "package:native_sqlite_generator/src/post_build_hook.dart"
    builder_factory: "nativeCodePostBuilder"
    input_extensions: [".table.dart"]
